# Production stack. Pulls prebuilt images from Docker Hub (built + pushed with
# scripts/publish.sh) instead of building locally, so the FontAwesome Pro token
# never touches the deployment host.
#
#   cp .env.prod.example .env      # then fill in real secrets
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Put your real TLS cert/key in ./nginx/certs (server.crt / server.key); if the
# dir is empty a self-signed cert is generated so the site still comes up.

# Own project name so the prod stack's containers and (crucially) its pgdata
# volume never collide with the dev stack's `web-kanban` project. Sharing the
# volume is a common cause of "backend unhealthy": Postgres only sets the
# password on first init, so a volume created by the dev stack keeps the dev
# password and the prod backend fails to authenticate.
name: jamra-prod

services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kanban}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-kanban}
    volumes:
      - pgdata:/var/lib/postgresql
    # Not published to the host in production — only the backend reaches it over
    # the internal compose network.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kanban}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    image: marcowartmannmw/jamra-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-kanban}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-kanban}
      BOOTSTRAP_ADMIN: "true"
      # Encrypts the stored SFTP backup password — must be a strong, stable secret.
      APP_SECRET: ${APP_SECRET:?set APP_SECRET in .env}
      # Served behind TLS in production, so the session cookie is HTTPS-only.
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-admin@example.com}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:?set INITIAL_ADMIN_PASSWORD in .env}
      INITIAL_ADMIN_NAME: ${INITIAL_ADMIN_NAME:-Admin}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-admin}
      LDAP_ENABLED: ${LDAP_ENABLED:-false}
      LDAP_SERVER_URI: ${LDAP_SERVER_URI:-ldaps://ldap.internal:636}
      LDAP_START_TLS: ${LDAP_START_TLS:-false}
      LDAP_CA_CERT_FILE: ${LDAP_CA_CERT_FILE:-}
      LDAP_BIND_DN: ${LDAP_BIND_DN:-}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD:-}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-ou=people,dc=example,dc=com}
      LDAP_USER_FILTER: ${LDAP_USER_FILTER:-(&(objectClass=inetOrgPerson)(uid={uid}))}
      LDAP_ATTR_EMAIL: ${LDAP_ATTR_EMAIL:-mail}
      LDAP_ATTR_DISPLAY_NAME: ${LDAP_ATTR_DISPLAY_NAME:-cn}
    volumes:
      - snapshots:/app/snapshots
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health', timeout=3).status == 200 else 1)"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    image: marcowartmannmw/jamra-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      # Real TLS cert/key on the host: server.crt / server.key. A self-signed
      # cert is generated here on first start if the dir is empty.
      - ./nginx/certs:/etc/nginx/certs
    ports:
      - "${APP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"

volumes:
  pgdata:
  snapshots:
