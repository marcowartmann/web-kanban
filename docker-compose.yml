services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kanban}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kanban}
      POSTGRES_DB: ${POSTGRES_DB:-kanban}
    volumes:
      # postgres:18+ stores data in a version subdir; mount the parent dir
      # (mounting /var/lib/postgresql/data fails on 18+).
      - pgdata:/var/lib/postgresql
    # Expose Postgres to external clients (psql/DBeaver/pgAdmin). Bound to
    # 127.0.0.1 by default so only this host can reach it; set DB_BIND=0.0.0.0
    # in .env to allow LAN access (pair with a strong POSTGRES_PASSWORD).
    ports:
      - "${DB_BIND:-127.0.0.1}:${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kanban}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-kanban}:${POSTGRES_PASSWORD:-kanban}@db:5432/${POSTGRES_DB:-kanban}
      BOOTSTRAP_ADMIN: "true"
      # Set to "true" behind TLS so the session cookie is HTTPS-only.
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      # Dev defaults — override all three in any real deployment.
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-admin@example.com}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-admin}
      INITIAL_ADMIN_NAME: ${INITIAL_ADMIN_NAME:-Admin}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-admin}
      # LDAP authentication — off by default; set LDAP_ENABLED=true + the rest to enable.
      LDAP_ENABLED: ${LDAP_ENABLED:-false}
      LDAP_SERVER_URI: ${LDAP_SERVER_URI:-ldaps://ldap.internal:636}
      LDAP_START_TLS: ${LDAP_START_TLS:-false}
      LDAP_CA_CERT_FILE: ${LDAP_CA_CERT_FILE:-}
      LDAP_BIND_DN: ${LDAP_BIND_DN:-}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD:-}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-ou=people,dc=example,dc=com}
      LDAP_USER_FILTER: ${LDAP_USER_FILTER:-(&(objectClass=inetOrgPerson)(uid={uid}))}
      LDAP_ATTR_EMAIL: ${LDAP_ATTR_EMAIL:-mail}
      LDAP_ATTR_DISPLAY_NAME: ${LDAP_ATTR_DISPLAY_NAME:-cn}
    volumes:
      - snapshots:/app/snapshots
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health', timeout=3).status == 200 else 1)"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:80"

volumes:
  pgdata:
  snapshots:
