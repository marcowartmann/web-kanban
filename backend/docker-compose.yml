services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: kanban
      POSTGRES_PASSWORD: kanban
      POSTGRES_DB: kanban
    ports:
      - "5432:5432"
    volumes:
      # postgres:18+ stores data in a version subdir; mount the parent dir.
      - pgdata:/var/lib/postgresql

volumes:
  pgdata:
