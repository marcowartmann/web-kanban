# Shared location blocks, included by both the HTTP (80) and HTTPS (443) server
# blocks in nginx.conf so the two stay in lockstep.

# Reverse-proxy API calls to the backend service (same compose network).
location /api/ {
  proxy_pass http://backend:8000;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
}

# Content-hashed build assets never change for a given URL — cache hard.
location /assets/ {
  root /usr/share/nginx/html;
  add_header Cache-Control "public, max-age=31536000, immutable";
}

# Serve the SPA, falling back to index.html for client-side routes.
location / {
  root /usr/share/nginx/html;
  try_files $uri /index.html;
  # index.html must always revalidate so a redeploy is picked up immediately
  # (it points at the hashed asset URLs above).
  add_header Cache-Control "no-cache";
}
