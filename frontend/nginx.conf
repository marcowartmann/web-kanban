# The app is served over both HTTP (80) and HTTPS (443). The shared routing
# lives in app_locations.conf; each server block just includes it.
#
# TLS cert/key are read from /etc/nginx/certs (bind-mounted from ./nginx/certs
# on the host). If none is present at startup a self-signed dev cert is
# generated — see /docker-entrypoint.d/10-gen-dev-cert.sh.

server {
  listen 80;
  server_name _;
  client_max_body_size 10m;            # headroom for CSV uploads

  include /etc/nginx/app_locations.conf;
}

server {
  listen 443 ssl;
  server_name _;
  client_max_body_size 10m;

  ssl_certificate     /etc/nginx/certs/server.crt;
  ssl_certificate_key /etc/nginx/certs/server.key;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 10m;

  include /etc/nginx/app_locations.conf;
}
